name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ELECTRON_RUN_AS_NODE: ''
  PLAYWRIGHT_HTML_OPEN: never
  NODE_VERSION: '20'
  YARN_ENABLE_GLOBAL_CACHE: 'true'

defaults:
  run:
    shell: cmd

jobs:
  bootstrap:
    runs-on: self-hosted
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Normalize Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global core.safecrlf false
          git config core.autocrlf false
          git config core.eol lf
          git checkout -- .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        shell: powershell
        run: |
          "dir=$(yarn cache dir)" >> $env:GITHUB_OUTPUT

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Enable Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Restore tool caches
        uses: actions/cache@v4
        with:
          path: |
            .vite
            node_modules/.cache/eslint
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-toolcache-${{ hashFiles('yarn.lock', 'package.json', 'vite.*.config.ts', 'vitest.config.ts', 'playwright.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-toolcache-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Rebuild native modules
        run: yarn postinstall

  fast-checks:
    needs: bootstrap
    runs-on: self-hosted
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: format
            label: Format check
            command: yarn format:check
          - id: typecheck
            label: Type check
            command: yarn type-check
          - id: lint
            label: Lint
            command: yarn lint
          - id: unit
            label: Unit tests with coverage
            command: yarn test:unit:coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Normalize Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global core.safecrlf false
          git config core.autocrlf false
          git config core.eol lf
          git checkout -- .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        shell: powershell
        run: |
          "dir=$(yarn cache dir)" >> $env:GITHUB_OUTPUT

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Enable Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Restore tool caches
        uses: actions/cache@v4
        with:
          path: |
            .vite
            node_modules/.cache/eslint
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-toolcache-${{ hashFiles('yarn.lock', 'package.json', 'vite.*.config.ts', 'vitest.config.ts', 'playwright.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-toolcache-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Rebuild native modules
        run: yarn postinstall

      - name: Run ${{ matrix.label }}
        run: |
          if ("${{ matrix.id }}" -eq "lint" -and "${{ github.event_name }}" -eq "pull_request") {
            yarn lint:changed
          else
            $cmd = "${{ matrix.command }}"
            Invoke-Expression $cmd
          }
        shell: powershell

      - name: Upload coverage report
        if: always() && matrix.id == 'unit'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 10
          if-no-files-found: ignore

  package:
    needs: bootstrap
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Normalize Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global core.safecrlf false
          git config core.autocrlf false
          git config core.eol lf
          git checkout -- .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        shell: powershell
        run: |
          "dir=$(yarn cache dir)" >> $env:GITHUB_OUTPUT

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Enable Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Restore tool caches
        uses: actions/cache@v4
        with:
          path: |
            .vite
            node_modules/.cache/eslint
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-toolcache-${{ hashFiles('yarn.lock', 'package.json', 'vite.*.config.ts', 'vitest.config.ts', 'playwright.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-toolcache-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Rebuild native modules
        run: yarn postinstall

      - name: Package app
        run: yarn package

      - name: Upload packaged app
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packaged-app
          path: out/
          retention-days: 5
          if-no-files-found: ignore

  e2e:
    needs: package
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Normalize Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
          git config --global core.safecrlf false
          git config core.autocrlf false
          git config core.eol lf
          git checkout -- .

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get Yarn cache directory
        id: yarn-cache-dir
        shell: powershell
        run: |
          "dir=$(yarn cache dir)" >> $env:GITHUB_OUTPUT

      - name: Restore Yarn cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Enable Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn --version

      - name: Restore tool caches
        uses: actions/cache@v4
        with:
          path: |
            .vite
            node_modules/.cache/eslint
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-toolcache-${{ hashFiles('yarn.lock', 'package.json', 'vite.*.config.ts', 'vitest.config.ts', 'playwright.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-toolcache-

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Rebuild native modules
        run: yarn postinstall

      - name: Download packaged app
        uses: actions/download-artifact@v4
        with:
          name: packaged-app
          path: out/

      - name: Run e2e tests (reuse packaged artifact)
        run: yarn test:e2e:ci

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 10
          if-no-files-found: ignore

  ci-summary:
    if: always()
    needs: [fast-checks, package, e2e]
    runs-on: self-hosted
    steps:
      - name: Fail if any CI job failed
        run: |
          set FAST_CHECKS=${{ needs.fast-checks.result }}
          set PACKAGE=${{ needs.package.result }}
          set E2E=${{ needs.e2e.result }}
          if /I not "%FAST_CHECKS%"=="success" (
            echo CI failed in: fast-checks
            exit /b 1
          )
          if /I not "%PACKAGE%"=="success" (
            echo CI failed in: package
            exit /b 1
          )
          if /I not "%E2E%"=="success" (
            echo CI failed in: e2e
            exit /b 1
          )
          echo CI passed: all jobs succeeded.
